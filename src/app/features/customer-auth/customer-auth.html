<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-md z-50 flex items-center justify-center p-4 overflow-y-auto animate-in fade-in duration-200">
  
  <!-- Red and Blue decorative blurred circles -->
  <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-pizza-red/10 blur-3xl"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 rounded-full bg-blue-500/10 blur-3xl"></div>

  <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full border border-slate-100 overflow-hidden relative p-8 animate-in fade-in zoom-in-95 duration-200">
    
    <!-- Close / Back Button (Go directly to menu) -->
    <button 
      (click)="volverAlMenu()"
      class="absolute top-5 right-5 w-10 h-10 rounded-full bg-slate-50 hover:bg-slate-100 text-slate-400 hover:text-slate-600 flex items-center justify-center transition-colors cursor-pointer border border-slate-100"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Header -->
    <div class="text-center mb-8">
      <h2 class="text-2xl font-black text-slate-800 tracking-tight leading-none uppercase">
        Iniciar Sesión
      </h2>
      <p class="text-xs text-slate-400 font-bold tracking-wider uppercase mt-2">
        Bienvenido a Planet Pizza
      </p>
    </div>

    <!-- Error message alert -->
    @if (errorMessage(); as errorMsg) {
      <div class="bg-red-50 text-red-600 border border-red-100 rounded-2xl p-4 mb-6 flex items-start gap-3 animate-in fade-in duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 shrink-0 mt-0.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
        </svg>
        <span class="text-xs font-bold">{{ errorMsg }}</span>
      </div>
    }

    <!-- Google Login Button -->
    <div class="w-full flex justify-center mb-4 min-h-[44px]">
      <div id="google-btn" class="w-full"></div>
    </div>

    <!-- Or Divider -->
    <div class="flex items-center gap-3 my-5">
      <div class="flex-1 h-px bg-slate-200"></div>
      <span class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">O entra con tu correo</span>
      <div class="flex-1 h-px bg-slate-200"></div>
    </div>

    <!-- Form -->
    <form (submit)="onSubmit(); $event.preventDefault()" class="space-y-5">
      
      <!-- Email Field -->
      <div class="space-y-1.5">
        <label class="text-[10px] font-black uppercase text-slate-400 tracking-wider">
          Correo Electrónico
        </label>
        <div class="relative">
          <input 
            type="text" 
            name="email"
            [(ngModel)]="email"
            placeholder="correo@ejemplo.com"
            class="w-full bg-slate-50 border border-slate-200/80 rounded-2xl py-3 px-4 text-sm font-bold text-slate-800 placeholder-slate-400 focus:outline-none focus:border-pizza-red focus:bg-white transition-all"
            required
          />
        </div>
      </div>

      <!-- Password Field -->
      <div class="space-y-1.5">
        <label class="text-[10px] font-black uppercase text-slate-400 tracking-wider">Contraseña</label>
        <div class="relative">
          <input 
            type="password" 
            name="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            class="w-full bg-slate-50 border border-slate-200/80 rounded-2xl py-3 px-4 text-sm font-bold text-slate-800 placeholder-slate-400 focus:outline-none focus:border-pizza-red focus:bg-white transition-all"
            required
          />
        </div>
      </div>

      <!-- Submit button -->
      <button 
        type="submit" 
        [disabled]="loading()"
        class="w-full text-white font-bold py-3.5 px-6 rounded-2xl flex items-center justify-center gap-2 cursor-pointer transition-all duration-150 shadow-lg disabled:opacity-50 disabled:pointer-events-none mt-6 bg-pizza-red hover:bg-red-700 shadow-red-100 hover:shadow-red-200"
      >
        @if (loading()) {
          <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Procesando...
        } @else {
          Iniciar Sesión
        }
      </button>

    </form>

  </div>
</div>
