<!-- Administrative Panel Outer Wrapper -->
<div 
  class="h-screen w-screen flex overflow-hidden transition-all duration-300 font-sans"
  [class]="themeService.activeTheme.class"
  style="background: linear-gradient(135deg, var(--admin-bg-gradient-start) 0%, var(--admin-bg-gradient-end) 100%); color: var(--admin-text-main);"
>

  <!-- Sidebar Component -->
  <aside 
    class="w-64 flex-shrink-0 flex flex-col justify-between shadow-2xl z-20 transition-all duration-300 border-r border-white/5"
    style="background-color: var(--admin-sidebar-bg); color: var(--admin-sidebar-text);"
  >
    <!-- Top Brand & User profile block -->
    <div>
      <!-- Logo Header -->
      <div class="h-20 flex items-center gap-3 px-6 border-b border-white/5 bg-black/10">
        <div class="h-10 w-10 rounded-xl overflow-hidden bg-white flex items-center justify-center p-0.5 border border-white/10 shadow-inner flex-shrink-0">
          <img 
            src="assets/images/logo_pizza.JPG" 
            alt="Planet Pizza Logo" 
            class="h-full w-full object-cover rounded-xl"
          />
        </div>
        <div>
          <h2 class="text-lg font-black tracking-wider leading-none text-white uppercase">Planet Admin</h2>
          <span class="text-[9px] text-white/50 font-bold uppercase tracking-widest mt-1 block">Panel de Control</span>
        </div>
      </div>

   

      <!-- Navigation Links -->
      <nav class="p-4 space-y-1">
        @for (item of menuItems; track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="active-link"
            class="flex items-center gap-3.5 px-4 py-2.5 rounded-xl font-bold text-sm transition-all duration-200 hover:bg-white/5 hover:translate-x-1 group"
          >
            <span [innerHTML]="item.icon" class="text-white/50 group-hover:text-white transition-colors duration-200"></span>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>
    </div>

    <!-- Live Indicators & Logout (Density Details) -->
    <div>
      <!-- Live Metrics Widget (Less Minimalist Detail) -->
  

      <!-- Exit Button Section (ONLY ONE LOGOUT BUTTON) -->
      <div class="p-4 border-t border-white/5 bg-black/10">
        <button
          (click)="onLogout()"
          class="flex items-center justify-center gap-2 w-full py-3 rounded-xl bg-red-600/15 hover:bg-red-600/25 text-red-400 hover:text-red-300 font-bold text-xs uppercase tracking-wider transition-all duration-150 active:scale-95 text-center cursor-pointer border border-red-500/10 shadow-inner"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 text-red-500">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
          </svg>
          Cerrar Sesión (Salir)
        </button>
        <div class="text-center mt-3.5 text-[8px] text-white/30 font-semibold uppercase tracking-wider">
          Planet Pizza &copy; {{ currentYear }}
        </div>
      </div>
    </div>

  </aside>

  <!-- Main View Container -->
  <div class="flex-1 flex flex-col overflow-hidden">
    
    <!-- Topbar Header -->
    <header 
      class="h-20 flex items-center justify-between px-8 border-b transition-all duration-300 shadow-sm"
      style="background-color: var(--admin-header-bg); border-color: var(--admin-header-border); color: var(--admin-header-text);"
    >
      <!-- Title & Context -->
      <div>
        <h1 class="text-xl font-black tracking-tight uppercase leading-none">Administración</h1>
        <span class="text-[9px] uppercase font-bold tracking-widest block transition-colors duration-300 mt-1.5" style="color: var(--admin-header-subtitle);">Gestión General del Kiosco</span>
      </div>

      <!-- Quick Metrics/Badges (Less Minimalist Details) -->
      <div class="flex items-center gap-4">
        <!-- Terminal & DB Connection Indicators (Less Minimalist) -->
       

      
      </div>
    </header>

    <!-- Dynamic Route Outlet Content (Dashboard, Orders, Catalog, etc.) -->
    <main class="flex-1 overflow-y-auto p-8">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
