@if (cartService.activeModal() === 'size' && cartService.customizingPizza(); as pizza) {
  <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4 transition-all duration-300">
    <div class="bg-white rounded-3xl shadow-2xl max-w-2xl w-full overflow-hidden relative border border-slate-100 animate-in fade-in zoom-in-95 duration-200">
      
      <!-- Close Button -->
      <button 
        (click)="close()"
        class="absolute top-5 right-5 w-10 h-10 rounded-full bg-slate-50 hover:bg-slate-100 text-slate-400 hover:text-slate-600 flex items-center justify-center transition-colors cursor-pointer border border-slate-100"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Modal Content -->
      <div class="p-8">
        <h2 class="text-2xl font-bold text-slate-800 mb-8 text-center pr-8">
          Elige el tamaño de tu <span class="text-pizza-red">{{ pizza.nombre }}</span>
        </h2>

        <!-- Size Options Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
          @for (size of cartService.SIZES; track size.nombre) {
            <div 
              (click)="selectSize(size)"
              class="bg-white border-2 border-slate-100 hover:border-pizza-orange/40 hover:shadow-lg hover:shadow-orange-50/50 rounded-2xl p-6 flex flex-col items-center justify-center text-center cursor-pointer transition-all duration-200 active:scale-95 group"
            >
              <!-- Pizza Slice SVG with size-based scaling -->
              <div 
                class="mb-4 text-amber-500 transition-transform duration-300 group-hover:scale-110 flex items-center justify-center"
                [class.w-12]="size.nombre === 'Chica' || size.nombre === 'Personal'"
                [class.h-12]="size.nombre === 'Chica' || size.nombre === 'Personal'"
                [class.w-16]="size.nombre === 'Mediana'"
                [class.h-16]="size.nombre === 'Mediana'"
                [class.w-20]="size.nombre === 'Grande' || size.nombre === 'Familiar'"
                [class.h-20]="size.nombre === 'Grande' || size.nombre === 'Familiar'"
              >
                <!-- Beautiful Vector Pizza Slice SVG -->
                <svg 
                  viewBox="0 0 64 64" 
                  fill="none" 
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-full h-full"
                >
                  <!-- Crust -->
                  <path d="M56 12C48 6 36 4 32 4C28 4 16 6 8 12C7 13 8 15 9 15.5C14 18 20 20 32 20C44 20 50 18 55 15.5C56 15 57 13 56 12Z" fill="#E85D04"/>
                  <!-- Base / Cheese -->
                  <path d="M53.5 16.5C48 20.5 38 23 32 23C26 23 16 20.5 10.5 16.5C10 16 9.5 17 10 18L30.5 58.5C31 59.5 33 59.5 33.5 58.5L54 18C54.5 17 54 16 53.5 16.5Z" fill="#FFB703"/>
                  <!-- Pepperoni Slices -->
                  <circle cx="24" cy="24" r="3.5" fill="#D00000"/>
                  <circle cx="40" cy="24" r="3.5" fill="#D00000"/>
                  <circle cx="32" cy="36" r="3.5" fill="#D00000"/>
                  <circle cx="28" cy="46" r="2.5" fill="#D00000"/>
                  <!-- Sauce Drops -->
                  <circle cx="18" cy="18" r="1.5" fill="#990000"/>
                  <circle cx="46" cy="18" r="1.5" fill="#990000"/>
                  <circle cx="36" cy="48" r="1.5" fill="#990000"/>
                </svg>
              </div>

              <!-- Size Title -->
              <h4 class="text-xl font-bold text-slate-800 mb-1 group-hover:text-pizza-orange transition-colors">
                {{ size.nombre }}
              </h4>

              <!-- Size Info -->
              <p class="text-xs text-slate-400 font-medium mb-3">
                {{ size.medida }}
              </p>

              <!-- Size Price -->
              <span class="text-xl font-extrabold text-pizza-orange">
                ${{ size.precio }}
              </span>
            </div>
          }
        </div>
      </div>

    </div>
  </div>
}
