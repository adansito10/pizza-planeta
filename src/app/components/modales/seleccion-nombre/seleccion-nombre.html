@if (cartService.activeModal() === 'name') {
  <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4 transition-all duration-300">
    <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden relative border border-slate-100 animate-in fade-in zoom-in-95 duration-200">
      
      <!-- Close Button -->
      <button 
        (click)="close()"
        class="absolute top-5 right-5 w-10 h-10 rounded-full bg-slate-50 hover:bg-slate-100 text-slate-400 hover:text-slate-600 flex items-center justify-center transition-colors cursor-pointer border border-slate-100"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Modal Content -->
      <div class="p-8 flex flex-col space-y-6">
        
        <!-- Header -->
        <div class="text-center space-y-2">
          <div class="mx-auto w-16 h-16 rounded-full bg-orange-50 flex items-center justify-center border border-orange-100 text-pizza-orange">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
          </div>
          
          <h2 class="text-2xl font-black text-slate-800 tracking-tight">Confirmar Datos</h2>
          <p class="text-xs text-slate-400 font-medium">Completa tus datos de contacto para poder avisarte cuando tu pizza esté lista en el horno.</p>
        </div>

        <!-- Form / Input -->
        <form (ngSubmit)="confirmar()" class="space-y-4">
          <!-- Name Field -->
          <div class="space-y-1.5">
            <label class="text-[9px] uppercase font-bold tracking-widest text-slate-400">Nombre Completo</label>
            <input 
              type="text" 
              name="nombre"
              [(ngModel)]="nombre"
              placeholder="Ej. Juan Pérez"
              class="w-full px-5 py-4 rounded-2xl border text-sm font-bold bg-slate-50 border-slate-200 focus:outline-none focus:ring-2 focus:ring-pizza-orange/20 focus:border-pizza-orange transition-all text-slate-800"
              required
              autofocus
            >
          </div>

          <!-- Telephone Field -->
          <div class="space-y-1.5">
            <label class="text-[9px] uppercase font-bold tracking-widest text-slate-400">Número de Teléfono</label>
            <input 
              type="tel" 
              name="telefono"
              [(ngModel)]="telefono"
              placeholder="Ej. 2712917011"
              class="w-full px-5 py-4 rounded-2xl border text-sm font-bold bg-slate-50 border-slate-200 focus:outline-none focus:ring-2 focus:ring-pizza-orange/20 focus:border-pizza-orange transition-all text-slate-800"
              required
            >
          </div>

          <!-- Actions -->
          <div class="pt-4 border-t border-slate-100 flex gap-3">
            <button 
              type="submit"
              [disabled]="!nombre.trim() || !telefono.trim()"
              class="flex-grow bg-pizza-red hover:bg-red-700 disabled:bg-slate-200 disabled:text-slate-400 disabled:shadow-none active:scale-95 text-white font-black py-4 px-6 rounded-2xl flex items-center justify-center gap-2 transition-all duration-150 shadow-lg shadow-red-100 cursor-pointer"
            >
              Proceder al Pago
            </button>
            <button 
              type="button"
              (click)="close()"
              class="bg-slate-100 hover:bg-slate-200 text-slate-500 px-6 py-4 rounded-2xl font-black text-xs uppercase tracking-wider transition-colors cursor-pointer"
            >
              Cancelar
            </button>
          </div>
        </form>
      </div>

    </div>
  </div>
}
