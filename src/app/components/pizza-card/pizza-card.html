<div (click)="ordenar()" class="bg-white rounded-3xl border border-slate-100 hover:border-slate-200 shadow-sm hover:shadow-md transition-all duration-300 flex flex-col h-full cursor-pointer relative overflow-hidden group">
  <!-- Pizza Image -->
  <div class="w-full h-52 overflow-hidden relative bg-slate-50 flex items-center justify-center p-3">
    <img 
      [src]="pizza().imagen" 
      [alt]="pizza().nombre" 
      class="max-h-full w-auto object-contain transition-transform duration-500 group-hover:scale-105"
    />
  </div>

  <!-- Pizza Details & Plus button -->
  <div class="p-5 flex-1 flex flex-col justify-between relative">
    <div class="space-y-2 pr-12">
      <h3 class="text-lg font-black text-slate-800 group-hover:text-pizza-red transition-colors uppercase tracking-tight leading-snug">
        {{ pizza().nombre }}
      </h3>
      <p class="text-xs text-slate-500 font-semibold leading-relaxed line-clamp-3">
        {{ pizza().descripcion }}
      </p>
    </div>

    <!-- Small Circular Add Button -->
    <div class="absolute bottom-5 right-5">
      <div class="w-9 h-9 rounded-full bg-pizza-red hover:bg-red-700 active:scale-90 text-white flex items-center justify-center shadow-md transition-all duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
      </div>
    </div>
  </div>
</div>
