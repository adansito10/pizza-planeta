<div class="bg-white rounded-3xl shadow-md border border-slate-100 overflow-hidden flex flex-col h-full p-4 transition-all duration-300 hover:shadow-xl hover:-translate-y-1.5 group">
  <!-- Pizza Image -->
  <div class="w-full h-48 rounded-2xl overflow-hidden mb-4 relative bg-slate-100">
    <img 
      [src]="pizza().imagen" 
      [alt]="pizza().nombre" 
      class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
    />
  </div>

  <!-- Pizza Details -->
  <div class="flex-1 flex flex-col justify-between mb-4">
    <div>
      <h3 class="text-xl font-bold text-slate-800 group-hover:text-pizza-red transition-colors mb-1.5">
        {{ pizza().nombre }}
      </h3>
      <p class="text-sm text-slate-500 leading-relaxed">
        {{ pizza().descripcion }}
      </p>
    </div>
  </div>

  <!-- Order Button -->
  <button 
    (click)="ordenar()"
    class="w-full bg-pizza-red hover:bg-red-700 active:scale-95 text-white font-semibold py-3 px-4 rounded-2xl flex items-center justify-center gap-2 transition-all duration-200 shadow-lg shadow-red-100 hover:shadow-red-200 cursor-pointer"
  >
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
    </svg>
    Ordenar Ahora
  </button>
</div>
