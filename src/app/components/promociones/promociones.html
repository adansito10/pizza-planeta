<div class="space-y-6">
  <div class="flex flex-col gap-1.5">
    <h2 class="text-3xl font-black text-slate-800 tracking-tight uppercase">Promociones</h2>
    <p class="text-sm text-slate-400 font-medium">Las mejores combinaciones y combos de Planeta Pizza para ti hoy.</p>
  </div>
  
  <!-- Promos Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 pb-12">
    @for (promo of promos; track promo.id) {
      <div 
        (click)="ordenarPromo(promo)"
        class="bg-[#fcfaf7] rounded-3xl shadow-sm border border-slate-100 hover:border-slate-200 overflow-hidden flex flex-col h-full cursor-pointer relative group transition-all duration-300 hover:shadow-xl hover:-translate-y-1.5"
      >

        <!-- Image Container -->
        <div class="w-full h-48 rounded-2xl overflow-hidden mb-4 relative bg-slate-100">
          <img 
            [src]="promo.imagen" 
            [alt]="promo.nombre" 
            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
          />
        </div>

        <!-- Details -->
        <div class="p-5 flex-1 flex flex-col justify-between relative">
          <div class="space-y-2 pr-12">
            <h3 class="text-lg font-black text-slate-800 group-hover:text-pizza-red transition-colors uppercase tracking-tight leading-snug">
              {{ promo.nombre }}
            </h3>
            <p class="text-xs text-slate-500 font-semibold leading-relaxed line-clamp-3">
              {{ promo.descripcion }}
            </p>
          </div>

          <!-- Circular Add Button -->
          <div class="absolute bottom-5 right-5">
            <div class="w-9 h-9 rounded-full bg-pizza-red hover:bg-red-700 active:scale-90 text-white flex items-center justify-center shadow-md transition-all duration-200">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
              </svg>
            </div>
          </div>
        </div>

      </div>
    }
  </div>
</div>
