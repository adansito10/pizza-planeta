<div class="space-y-6">
  <div class="flex flex-col gap-1.5">
    <h2 class="text-3xl font-black text-slate-800 tracking-tight">Promociones Especiales</h2>
    <p class="text-sm text-slate-400 font-medium">Las mejores combinaciones y descuentos para ti hoy.</p>
  </div>
  
  <!-- Promos Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 pb-12">
    @for (promo of promos; track promo.id) {
      <div class="bg-white rounded-3xl shadow-md border border-slate-100 overflow-hidden flex flex-col h-full p-4 transition-all duration-300 hover:shadow-xl hover:-translate-y-1.5 group relative">
        

        <!-- Image Container -->
        <div class="w-full h-48 rounded-2xl overflow-hidden mb-4 relative bg-slate-100">
          <img 
            [src]="promo.imagen" 
            [alt]="promo.nombre" 
            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
          />
        </div>

        <!-- Details -->
        <div class="flex-1 flex flex-col justify-between mb-2">
          <div>
            <h3 class="text-xl font-black text-slate-800 group-hover:text-pizza-red transition-colors mb-1 uppercase tracking-tight">
              {{ promo.nombre }}
            </h3>
            <p class="text-[9px] text-slate-400 font-black uppercase tracking-wider mb-2">Promoción Especial</p>
            <p class="text-xs text-slate-500 leading-relaxed font-semibold">
              {{ promo.descripcion }}
            </p>
          </div>
        </div>

        <!-- Order Button -->
        <div class="border-t border-slate-100 pt-4 mt-2">
          <button 
            (click)="ordenarPromo(promo)"
            class="w-full bg-pizza-red hover:bg-red-700 active:scale-95 text-white font-bold py-3.5 px-4 rounded-2xl flex items-center justify-center gap-2 transition-all duration-200 shadow-lg shadow-red-100 hover:shadow-red-200 cursor-pointer text-xs uppercase tracking-wider"
          >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-4 h-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            Ordenar Ahora
          </button>
        </div>
      </div>
    }
  </div>
</div>
